<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文历史杂志资源库</title>
    <meta name="description" content="抓取并展示中文历史杂志与期刊资源，可直接部署到 GitHub Pages。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1 class="logo">中文历史杂志资源库</h1>
            <p class="tagline">自动抓取中文历史杂志资源 · 支持 GitHub Pages 部署</p>
        </div>
    </header>

    <main class="main">
        <section class="panel controls">
            <div class="search-row">
                <input id="searchInput" type="text" placeholder="输入标题或关键词，例如：东方杂志 / 民国">
                <button id="clearSearchBtn" class="ghost-btn" type="button">清空</button>
            </div>
            <div class="filter-row">
                <button class="tab active" data-source="all">全部来源</button>
                <button class="tab" data-source="shuge">书格</button>
                <button class="tab" data-source="zh-wikipedia">中文维基百科</button>
                <button id="refreshBtn" class="refresh-btn" type="button">刷新页面</button>
            </div>
        </section>

        <section class="panel meta">
            <p>数据更新时间：<strong id="updatedAt">加载中...</strong></p>
            <p>当前结果数：<strong id="totalCount">0</strong></p>
            <p id="sourceSummary"></p>
        </section>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在加载资源...</p>
        </div>

        <div class="error" id="error" style="display: none;">
            <p>未能加载资源数据，请稍后重试。</p>
        </div>

        <section class="cards" id="resourceContainer"></section>
    </main>

    <footer class="footer">
        <p>本网站仅聚合公开可访问的中文历史杂志索引，版权归原站点及作者所有。</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
