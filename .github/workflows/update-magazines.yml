name: Update Magazine Data

on:
  workflow_dispatch:
  schedule:
    - cron: "20 */8 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest magazine resources
        run: python scripts/fetch_magazines.py

      - name: Commit and push data
        run: |
          if [[ -n "$(git status --porcelain data/magazines.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/magazines.json
            git commit -m "chore(data): 更新中文历史杂志数据"
            git push
          else
            echo "No data changes to commit."
          fi
